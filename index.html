<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact List</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body>

    <template class="js-user-temp">
        <li class="w-96 h-36 bg-white rounded-xl flex flex-col items-center justify-center mb-2">
            <h2 class="js-user-name text-4xl mb-3">Salom</h2>
            <div class="call-box w-100 h-13 flex items-center justify-center gap-5">
                <a href="tel:+998937340928" class="js-call-btn bg-green-700 text-white w-30 h-10 rounded-xl flex items-center justify-center">Telefon qilish</a>
                <button class="js-contact-del-btn bg-red-500 w-30 h-10 rounded-xl">Delete</button>
            </div>
        </li>
    </template>

    <header class="w-full h-24">
        <h1 class="text-6xl text-center">Contact list</h1>
    </header>

    <main class="w-full h-150">
        <div class="container mx-auto h-150 w-5/6">
            <section id="hero-section" class="w-full h-150 flex">
                <div class="get-contact w-1/2 h-full bg-green-300 rounded-l-2xl flex flex-col items-center justify-center gap-10">
                    <form autocomplete="off" class="js-form w-full h-full flex flex-col items-center justify-center gap-10">
                        <input autocomplete="off" type="text" id="username" class="js-username-inp w-96 h-12 rounded-xl bg-white outline-hidden text-center" placeholder="Name" required>
                        <input autocomplete="off" id="lastname" class="js-secname-inp w-96 h-12 rounded-xl bg-white outline-hidden text-center" placeholder="Surname">
                        <input autocomplete="off" type="number" id="usernumber" pattern="\d{12}" class="js-usernumber-inp w-96 h-12 rounded-xl bg-white outline-hidden text-center" placeholder="Phone Number" required>
                        <button class="js-send-btn bg-green-700 w-48 h-15 rounded-xl text-white" type="submit">Yuborish</button>
                    </form>
                </div>
                <div class="give-contact w-1/2 h-full bg-blue-200 rounded-r-2xl flex flex-col items-center justify-center">
                    <ul class="js-user-list">
                        
                    </ul>
                </div>
            </section>
        </div>
    </main>
    
    <script src="./tasks.js"></script>
    <script src="./index.js"></script>
</body>
</html>
